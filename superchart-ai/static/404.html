<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>페이지를 찾을 수 없음 — 범온 AI 슈퍼차트</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/png" sizes="64x64" href="/static/favicon.png?v=2">
<link rel="stylesheet" href="/static/fonts/pretendard/pretendard.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#921230;
  --primary-hover:#A31540;
  --gold:#D8B66A;
  --bg:#FAFAFA;
  --surface:#FFFFFF;
  --text:#0F172A;
  --muted:#64748B;
  --border:#E2E8F0;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0d1119;
    --surface:#141a26;
    --text:#E6EDF3;
    --muted:#9ca3af;
    --border:rgba(216,182,106,0.25);
  }
}
body{
  font-family:"Pretendard Variable","Pretendard",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;
  background:
    radial-gradient(circle at 12% 10%, rgba(146,18,48,0.14), transparent 34%),
    radial-gradient(circle at 88% 86%, rgba(216,182,106,0.16), transparent 36%),
    var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  -webkit-font-smoothing:antialiased;
}
.error-card{
  position:relative;
  overflow:hidden;
  background:linear-gradient(160deg, rgba(255,255,255,0.96), rgba(255,247,239,0.9));
  border:1px solid rgba(216,182,106,0.32);
  border-radius:20px;
  padding:48px 36px;
  max-width:500px;
  width:100%;
  text-align:center;
  box-shadow:0 18px 42px rgba(15,23,42,0.16);
}
.error-card::after{
  content:'';
  position:absolute;
  width:220px;
  height:220px;
  right:-90px;
  top:-100px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(146,18,48,0.18), transparent 70%);
  pointer-events:none;
}
.error-code{
  font-size:96px;
  font-weight:800;
  color:var(--primary);
  line-height:1;
  letter-spacing:-3px;
  margin-bottom:8px;
  text-shadow:0 8px 20px rgba(146,18,48,0.24);
}
.error-title{
  font-size:24px;
  font-weight:700;
  color:var(--text);
  margin-bottom:12px;
  letter-spacing:-0.5px;
}
.error-desc{
  font-size:15px;
  color:var(--muted);
  line-height:1.65;
  margin-bottom:32px;
}
.error-actions{
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
}
.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  height:44px;
  padding:0 20px;
  border-radius:10px;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  text-decoration:none;
  transition:all 0.18s ease;
  border:1px solid transparent;
}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 8px 20px rgba(146,18,48,0.28)}
.btn-primary:hover{background:var(--primary-hover);transform:translateY(-1px)}
.btn-secondary{background:transparent;color:var(--primary);border-color:var(--primary)}
.btn-secondary:hover{background:rgba(146,18,48,0.08)}
.btn:focus-visible{
  outline:3px solid rgba(146,18,48,0.28);
  outline-offset:2px;
}
.error-logo{width:64px;height:64px;margin:0 auto 24px;border-radius:50%;display:block;box-shadow:0 8px 18px rgba(15,23,42,0.15)}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none !important;transition:none !important}
  .btn-primary:hover{transform:none}
}
@media (max-width:480px){
  .error-card{ padding:32px 24px; border-radius:16px; }
  .error-code{ font-size:72px; }
  .error-title{ font-size:20px; }
  .error-desc{ font-size:14px; }
  .btn{width:100%}
}
</style>
</head>
<body>
<div class="error-card">
  <img class="error-logo" src="/static/logo.png" alt="범온 AI 슈퍼차트">
  <div class="error-code">404</div>
  <h1 class="error-title">페이지를 찾을 수 없습니다</h1>
  <p class="error-desc">
    요청하신 페이지가 삭제되었거나<br>
    잘못된 주소일 수 있습니다.
  </p>
  <div class="error-actions">
    <a href="/" class="btn btn-primary">차트로 이동</a>
    <a href="/landing" class="btn btn-secondary">홈으로</a>
  </div>
</div>
</body>
</html>
