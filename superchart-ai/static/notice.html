<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>공지사항 — 범온 AI 슈퍼차트</title>
<!--
  ⚠️ 이 페이지는 독립 문서이므로 차트 앱 전용 스타일(/static/css/main.css)을
  로드하지 않습니다. main.css 는 body 를 flex/100vh/overflow:hidden 으로 강제해
  문서형 페이지 레이아웃을 깨뜨리므로 의도적으로 제외합니다. (terms/faq/privacy 와 동일)
-->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{
  --wine:#921230;
  --wine-2:#6A1E33;
  --gold:#D8B66A;
  --text:#1f2937;
  --muted:#6b7280;
  --line:rgba(216,182,106,0.32);
}
*{box-sizing:border-box}
body{
  max-width:960px;
  margin:0 auto;
  padding:36px 18px 64px;
  background:
    radial-gradient(circle at 10% 5%, rgba(146,18,48,0.07), transparent 30%),
    radial-gradient(circle at 90% 86%, rgba(216,182,106,0.14), transparent 34%),
    linear-gradient(180deg,#fcfaf7 0%,#f7f1ea 100%);
  color:var(--text);
  font-family:'Pretendard Variable',sans-serif;
  line-height:1.8;
}
h1{font-size:30px;font-weight:800;color:var(--wine);margin-bottom:8px;letter-spacing:-0.02em}
.notice{
  border:1px solid rgba(216,182,106,0.28);
  border-radius:14px;
  padding:16px 16px 14px;
  margin-bottom:12px;
  background:rgba(255,255,255,0.86);
  box-shadow:0 10px 24px rgba(15,23,42,0.08);
  transition:all .2s ease;
}
.notice:hover{
  transform:translateY(-2px);
  box-shadow:0 14px 30px rgba(15,23,42,0.12);
  border-color:rgba(146,18,48,0.34);
}
.notice-date{font-size:12px;color:#8E7D72;font-weight:600}
.notice-title{font-size:17px;font-weight:700;color:#2f1d1f;margin:6px 0 10px;letter-spacing:-0.01em}
.notice-body{font-size:14px;color:#475569;line-height:1.78}
.badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;margin-right:6px;vertical-align:middle}
.badge-new{background:rgba(146,18,48,0.12);color:var(--wine)}
.badge-update{background:rgba(216,182,106,0.2);color:#8B6914}
.badge-event{background:rgba(59,130,246,0.14);color:#1d4ed8}
a{color:var(--wine);font-weight:600}
a:hover{color:#a31540}
a:focus-visible{
  outline:3px solid rgba(146,18,48,0.26);
  outline-offset:2px;
  border-radius:8px;
}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none !important;transition:none !important}
  .notice:hover{transform:none}
}

@media (prefers-contrast: more){
  .notice{border-color:#7a1a30}
  .notice-body{color:#1f2937}
}

@media (max-width:640px){
  body{padding:24px 12px 54px}
  h1{font-size:24px}
  .notice{border-radius:12px;padding:13px 12px}
  .notice-title{font-size:15px}
}
</style>
<script defer src="/static/i18n.js?v=20260719_i18n11"></script>
</head>
<body>
<h1>공지사항</h1>
<p style="font-size:13px;color:#8E7D72;margin-bottom:32px">범온 AI 슈퍼차트 서비스의 주요 업데이트 및 안내사항입니다.</p>

<div id="noticeList"><div style="color:#8E7D72;text-align:center;padding:24px">불러오는 중...</div></div>

<div style="margin-top:40px;text-align:center">
<a href="/" style="display:inline-block;padding:10px 24px;background:var(--wine);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">차트로 돌아가기</a>
</div>
<script>
const _NBADGE={notice:['badge-new','공지'],update:['badge-update','업데이트'],event:['badge-event','이벤트']};
const _NFALLBACK=`
<div class="notice"><div class="notice-title">베타 테스트 안내</div><div class="notice-body">현재 범온 AI 슈퍼차트는 베타 테스트 중입니다. 이용 중 불편하거나 개선이 필요한 점은 피드백으로 알려주시면 빠르게 반영하겠습니다. 감사합니다.</div></div>`;
function _esc(s){const d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML;}
(async function(){
  const el=document.getElementById('noticeList');
  try{
    const r=await fetch('/v1/site/notices');
    const d=(await r.json()).data||[];
    if(!d.length){el.innerHTML=_NFALLBACK;return;}
    el.innerHTML=d.map(n=>{
      const b=_NBADGE[n.content_type]||_NBADGE.notice;
      const date=(n.created_at||'').slice(0,10).replace(/-/g,'.');
      const pin=n.is_pinned?'<span class="badge" style="background:#92123022;color:var(--wine)">📌 고정</span>':'';
      return `<div class="notice"><div class="notice-date">${_esc(date)}</div>
        <div class="notice-title">${pin}<span class="badge ${b[0]}">${b[1]}</span>${_esc(n.title)}</div>
        <div class="notice-body">${(n.content||'').replace(/\n/g,'<br>')}</div></div>`;
    }).join('');
  }catch(e){ el.innerHTML=_NFALLBACK; }
})();
</script>
</body>
</html>
