version: "3.9"

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chart
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chart}
      POSTGRES_DB: chart_os
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./src/db/ddl.sql:/docker-entrypoint-initdb.d/01_ddl.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chart -d chart_os"]
      interval: 5s
      retries: 10

  # ── Redis ──
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  # ── Ollama (LLM) ──
  ollama:
    image: ollama/ollama:latest
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./Modelfile:/tmp/Modelfile:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      retries: 30
      start_period: 30s

  # ── Ollama 모델 초기화 (한 번만 실행) ──
  ollama-init:
    image: curlimages/curl:latest
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      sh -c "
        echo 'Pulling llama3.2:1b...' &&
        curl -sf http://ollama:11434/api/pull -d '{\"name\":\"llama3.2:1b\"}' &&
        echo 'Creating kanana-chart model...' &&
        curl -sf http://ollama:11434/api/create -d '{\"name\":\"kanana-chart\",\"from\":\"llama3.2:1b\",\"system\":\"당신은 암호화폐·주식·ETF 등 다양한 자산의 차트 분석 전문가입니다. 한국어로 간결하게 답변하세요.\",\"parameters\":{\"temperature\":0.7,\"num_ctx\":2048}}' &&
        echo 'Done!'
      "

  # ── Chart-OS App ──
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
  ollama_data:
