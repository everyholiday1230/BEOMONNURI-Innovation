<main id="main-content">
<section class="checkout-section reveal">

      <h1 class="co-result-title">정기결제 수단 등록·인증이 완료됐어요</h1>
      <div class="co-result-desc">
        카드(또는 계좌) 정기결제 인증이 정상적으로 처리됐습니다.<br>
        실제 서비스에서는 이 시점에 서버가 <b>빌링키 발급 API</b>를 호출하고,

    </div>
  </div>

</main>
<script>
  (function () {
    var params = new URLSearchParams(window.location.search);
    var el = document.getElementById('query-data');
    if (!params.toString()) { el.textContent = '전달된 쿼리 파라미터가 없습니다.'; return; }
    el.textContent = '';
    params.forEach(function (value, key) {
      var line = document.createElement('div');
      line.textContent = key + ' = ' + value;
      el.appendChild(line);
    });
  })();
</script>
