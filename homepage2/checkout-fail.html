<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>결제 실패(예시) | 범온누리</title>
<meta name="robots" content="noindex,nofollow">
<link rel="shortcut icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="assets/img/logos/company/favicon-32.png">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<link rel="stylesheet" href="assets/css/ai-frontier.css?v=20260723c">
<link rel="stylesheet" href="assets/css/v5-nextgen.css?v=20260723a">
<link rel="stylesheet" href="assets/css/v5-anchor.css?v=20260723a">
<link rel="stylesheet" href="assets/css/v5-mobile.css?v=20260723a">
<link rel="stylesheet" href="assets/css/checkout.css?v=20260723b">
</head>
<body class="grain">
<main id="main-content">
<section class="checkout-section reveal">
  <div class="container">
    <div class="co-result-card">
      <div class="co-result-icon">✕</div>
      <h1 class="co-result-title">결제(또는 인증)가 완료되지 않았어요</h1>
      <div class="co-result-desc">
        결제가 취소됐거나 인증 과정에서 오류가 발생했습니다.<br>
        아래 에러 코드·메시지를 확인한 뒤 다시 시도해주세요. 같은 오류가 반복되면 문의해주시기 바랍니다.
      </div>
      <div class="co-result-data" id="query-data">쿼리 파라미터 확인 중...</div>
      <div class="co-result-actions">
        <button type="button" class="co-result-back" id="retry-btn">다시 시도하기</button>
        <a href="contact.html" class="co-result-back co-result-back--ghost">문의하기 ↗</a>
      </div>
      <a href="index.html" class="co-result-home">홈으로 돌아가기</a>
    </div>
  </div>
</section>
</main>
<script>
  (function () {
    var params = new URLSearchParams(window.location.search);
    var el = document.getElementById('query-data');
    if (!params.toString()) { el.textContent = '전달된 쿼리 파라미터가 없습니다.'; return; }
    el.textContent = '';
    params.forEach(function (value, key) {
      var line = document.createElement('div');
      line.textContent = key + ' = ' + value;
      el.appendChild(line);
    });
  })();
  document.getElementById('retry-btn').addEventListener('click', function () {
    if (window.history.length > 1) { window.history.back(); }
    else { window.location.href = 'index.html'; }
  });
</script>
</body>
</html>
