<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>결제 실패(예시) | 범온누리</title>
<meta name="robots" content="noindex,nofollow">
<link rel="shortcut icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&family=Pretendard:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<link rel="stylesheet" href="assets/css/ai-frontier.css?v=20260722c">
<link rel="stylesheet" href="assets/css/v5-nextgen.css?v=20260708s">
<link rel="stylesheet" href="assets/css/checkout.css?v=20260720a">
</head>
<body class="grain">
<main id="main-content">
<section class="checkout-section reveal">
  <div class="container">
    <div class="co-result-card">
      <div class="co-result-icon">✕</div>
      <h1 class="co-result-title">결제(또는 인증)가 완료되지 않았어요</h1>
      <div class="co-result-desc">
        구매자가 결제를 취소했거나 인증 과정에서 오류가 발생했습니다.<br>
        아래 에러 코드·메시지를 확인해주세요.
      </div>
      <div class="co-result-data" id="query-data">쿼리 파라미터 확인 중...</div>
      <a href="index.html" class="co-result-back">홈으로 돌아가기</a>
    </div>
  </div>
</section>
</main>
<script>
  (function () {
    var params = new URLSearchParams(window.location.search);
    var el = document.getElementById('query-data');
    if (!params.toString()) { el.textContent = '전달된 쿼리 파라미터가 없습니다.'; return; }
    var lines = [];
    params.forEach(function (value, key) { lines.push(key + ' = ' + value); });
    el.innerHTML = lines.join('<br>');
  })();
</script>
</body>
</html>
